<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <style>
        /* Page background color */
        body {
            background-color:rgb(127, 180, 226); /* Light blue */
        }

        /* App container background and styling */
        .app-container {
            background-color:rgb(124, 63, 238); /* Light purple */
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2); /* Subtle shadow */
            padding: 20px;
            margin-top: 30px;
        }

        /* Center the form and card */
        .form-inline {
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container mt-5">
        <h1 class="text-center">Weather App</h1>
        
        <!-- Search Form -->
        <form method="GET" class="form-inline justify-content-center">
            <input type="text" name="city" class="form-control mr-2" placeholder="Enter city" value="{{ city }}">
            <button type="submit" class="btn btn-primary">Get Weather</button>
        </form>
        
        <!-- Weather Information -->
        <div class="app-container mx-auto">
            <h3 class="text-center">Weather in {{ city }}</h3>
            <div class="text-center">
                <img src="http://openweathermap.org/img/wn/{{ icon }}@2x.png" alt="Weather Icon">
            </div>
            <p><strong>Temperature:</strong> {{ temperature }}°C</p>
            <p><strong>Description:</strong> {{ description }}</p>
            <p><strong>Humidity:</strong> {{ humidity }}%</p>
            <p><strong>Wind Speed:</strong> {{ wind_speed }} m/s</p>
        </div>
    </div>
</body>
</html>
